<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - MeifuAI</title>
    <link rel="icon" type="image/png" href="https://meifu.tech/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>
    <div class="bg-grid"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
                <span class="logo-text">MeifuAI</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html" class="nav-link">首页</a>
                <a href="pricing.html" class="nav-link">定价</a>
                <a href="docs.html" class="nav-link">文档</a>
            </div>
            <div class="nav-actions">
                <a href="login.html" class="btn-login">登录</a>
                <button class="mobile-toggle" id="mobileToggle" aria-label="菜单">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </nav>

    <main class="auth-main">
        <div class="auth-container fade-in">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">
                        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/>
                            <path d="M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <h1 class="auth-title">重置密码</h1>
                    <p class="auth-subtitle">输入注册邮箱，我们将发送重置链接</p>
                </div>

                <form class="auth-form" id="forgotForm">
                    <div class="form-group">
                        <label for="email">邮箱地址</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="2" y="4" width="20" height="16" rx="2"/>
                                <path d="M22 4L12 13 2 4"/>
                            </svg>
                            <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email">
                        </div>
                    </div>

                    <button type="submit" class="btn-auth">发送重置链接</button>
                </form>

                <div class="auth-footer">
                    <p><a href="login.html">返回登录</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
